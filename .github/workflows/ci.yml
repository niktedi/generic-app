name: CI

# Runs only on push to main (as agreed).
on:
  push:
    branches: [main]

# GITHUB_TOKEN permissions: read for code, write to publish the image to ghcr.io.
# Without packages: write the push to ghcr fails with 403.
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # niktedi/generic-app

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1: tests. Spins up Postgres as a service container, applies
  # Alembic migrations, runs ruff + pytest against the real database.
  # ──────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    # Service container: GitHub spins up Postgres next to the runner.
    # Tests reach it over localhost:5432.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: calendar_test
        ports:
          - 5432:5432
        # healthcheck: the job waits until Postgres is actually ready to
        # accept connections before running any steps.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # These variables are read by both the app (app/config.py) and
    # alembic/env.py. The names must match exactly what the code expects.
    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: calendar_test
      DB_USER: postgres
      DB_PASSWORD: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python and sync deps
        run: uv sync --locked --dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Apply database migrations
        run: uv run alembic upgrade head

      - name: Run tests
        run: uv run pytest

  # ──────────────────────────────────────────────────────────────
  # JOB 2: build and publish the image. Runs ONLY if test passed
  # (needs: test). Tag is the short git SHA of the commit.
  # ──────────────────────────────────────────────────────────────
  build-push:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # metadata-action generates the tags. type=sha,prefix= produces a
      # clean short SHA (e.g. ghcr.io/niktedi/generic-app:a1b2c3d).
      - name: Extract image metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache via GitHub Actions cache — speeds up repeat builds.
          cache-from: type=gha
          cache-to: type=gha,mode=max
