---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "-1"
  name: postgres-secret
  namespace: generic-app
spec:
  encryptedData:
    DB_HOST: 
    DB_NAME: 
    DB_PASSWORD: 
    DB_PORT: 
    DB_USER: 
    POSTGRES_DB: 
    POSTGRES_PASSWORD: 
    POSTGRES_USER: 
  template:
    metadata:
      name: postgres-secret
      namespace: generic-app
    type: Opaque
