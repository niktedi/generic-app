# Homelab exposes the app on a NodePort (reachable via the VIP 192.168.8.240).
# On AWS this becomes type: LoadBalancer or an Ingress instead.
apiVersion: v1
kind: Service
metadata:
  name: generic-app
spec:
  type: NodePort
  ports:
    - name: http
      port: 80
      targetPort: 8000
      nodePort: 30080
