# Plain Kubernetes Secret for the EKS cluster (no SealedSecrets here).
# Learning values only. DB_HOST=postgres points at the headless Service below,
# so the app talks to the in-cluster StatefulSet, not RDS.
#
# stringData lets you write plain text; Kubernetes base64-encodes it for you.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: generic-app
type: Opaque
stringData:
  # consumed by the app
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: calendar
  DB_USER: calendar
  DB_PASSWORD: "123"
  # consumed by the postgres image on first init
  POSTGRES_DB: calendar
  POSTGRES_USER: calendar
  POSTGRES_PASSWORD: "123"
